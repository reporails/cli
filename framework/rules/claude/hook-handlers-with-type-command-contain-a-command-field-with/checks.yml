checks:
- id: CLAUDE.S.0004.settings_file_exists
  type: mechanical
  check: file_exists
- id: CLAUDE.S.0004.command_hook_has_command
  expect: absent
  message: Command hook has command not found
  patterns:
  - pattern-regex: (?s)\A[\s\S]+
  - pattern-not-regex: '"command"\s*:\s*"[^"]+"'
  type: deterministic
