checks:
- id: CLAUDE.S.0002.skill_file_exists
  type: mechanical
  check: file_exists
- id: CLAUDE.S.0002.name_matches_dir
  expect: absent
  message: Name matches dir not found
  patterns:
  - pattern-regex: (?s)\A[\s\S]+
  - pattern-not-regex: name:\s+[a-z][a-z0-9]*(?:-[a-z0-9]+)*
  type: deterministic
