# Claude Code Agent Configuration
# Schema: schemas/agent.schema.yml v0.5.0

agent: claude
version: "0.5.0"
prefix: CLAUDE
name: Claude Code

file_types:
  main:
    required: true
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/CLAUDE.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/CLAUDE.md"]
        precedence: user
        vcs: external
        maintainer: human
      managed:
        patterns:
          - "/etc/claude-code/CLAUDE.md"
          - "/Library/Application Support/ClaudeCode/CLAUDE.md"
          - "C:/Program Files/ClaudeCode/CLAUDE.md"
        precedence: managed
        vcs: external
        maintainer: system

  override:
    format: freeform
    scope: global
    cardinality: optional
    lifecycle: mutable
    loading: session_start
    scopes:
      local:
        patterns: ["CLAUDE.local.md"]
        precedence: user
        vcs: gitignored
        maintainer: human

  child_instruction:
    format: freeform
    scope: path_scoped
    cardinality: collection
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: ["**/CLAUDE.md"]
        precedence: project
        vcs: committed
        maintainer: human

  rules:
    format: [frontmatter, freeform]
    scope: path_scoped
    cardinality: collection
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: [".claude/rules/**/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/rules/*.md"]
        precedence: user
        vcs: external
        maintainer: human
        loading: session_start

  skills:
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: hierarchical
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".claude/skills/**/SKILL.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/skills/**/SKILL.md"]
        precedence: user
        vcs: external
        maintainer: human
      managed:
        patterns:
          - "/etc/claude-code/skills/**/SKILL.md"
          - "/Library/Application Support/ClaudeCode/skills/**/SKILL.md"
        precedence: managed
        vcs: external
        maintainer: system

  agents:
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".claude/agents/**/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/agents/**/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  commands:
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".claude/commands/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/commands/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  output_styles:
    format: [frontmatter, freeform]
    scope: global
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".claude/output-styles/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude/output-styles/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  config:
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".claude/settings.json"]
        precedence: project
        vcs: committed
        maintainer: human
      local:
        patterns: [".claude/settings.local.json"]
        precedence: user
        vcs: gitignored
        maintainer: human
        cardinality: optional
        lifecycle: mutable
      user:
        patterns: ["~/.claude/settings.json"]
        precedence: user
        vcs: external
        maintainer: human
      managed:
        patterns:
          - "/etc/claude-code/managed-settings.json"
          - "/Library/Application Support/ClaudeCode/managed-settings.json"
          - "C:/Program Files/ClaudeCode/managed-settings.json"
        precedence: managed
        vcs: external
        maintainer: system
      managed_dropin:
        patterns:
          - "/etc/claude-code/managed-settings.d/*.json"
          - "/Library/Application Support/ClaudeCode/managed-settings.d/*.json"
        precedence: managed
        vcs: external
        maintainer: system
        cardinality: collection

  mcp:
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".mcp.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.claude.json"]
        precedence: user
        vcs: external
        maintainer: human
      managed:
        patterns:
          - "/etc/claude-code/managed-mcp.json"
          - "/Library/Application Support/ClaudeCode/managed-mcp.json"
        precedence: managed
        vcs: external
        maintainer: system

  memory:
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: mutable
    loading: session_start
    scopes:
      auto:
        patterns: ["~/.claude/projects/*/memory/MEMORY.md"]
        precedence: auto
        vcs: external
        maintainer: agent

  subagent_memory:
    # Per-subagent persistent memory. Scope chosen via `memory:` frontmatter field
    # on the agent definition (user|project|local) — mutually exclusive per subagent.
    # MEMORY.md (first 200 lines / 25KB) injected into subagent system prompt at startup.
    format: freeform
    scope: task_scoped
    cardinality: collection
    lifecycle: mutable
    loading: session_start
    scopes:
      user:
        patterns: ["~/.claude/agent-memory/*/"]
        precedence: auto
        vcs: external
        maintainer: agent
      project:
        patterns: [".claude/agent-memory/*/"]
        precedence: auto
        vcs: committed
        maintainer: agent
      local:
        patterns: [".claude/agent-memory-local/*/"]
        precedence: auto
        vcs: gitignored
        maintainer: agent

  worktree_include:
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".worktreeinclude"]
        precedence: project
        vcs: committed
        maintainer: human

  keybindings:
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      user:
        patterns: ["~/.claude/keybindings.json"]
        precedence: user
        vcs: external
        maintainer: human

excludes:
  - CORE:C:0026  # Cross-agent compatibility — AGENTS.md is not a Claude surface
