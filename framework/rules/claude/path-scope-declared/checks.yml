checks:
- id: CLAUDE.S.0012.has_scope_key
  type: mechanical
  check: frontmatter_key
  args:
    key: paths
  message: "Path-scoped rule should declare 'paths' in frontmatter"
  severity: info
- id: CLAUDE.S.0012.uses_globs_key
  type: deterministic
  pattern-regex: '(?m)^globs:'
  expect: absent
  severity: medium
  message: "Claude Code reads 'paths:' not 'globs:' — rules with 'globs:' frontmatter have no path scoping"
- id: CLAUDE.S.0012.paths_resolve
  type: mechanical
  check: frontmatter_valid_glob
  args:
    path: ".claude/rules"
    require_matches: true
  message: "Path glob in frontmatter does not match any files in the project"
  severity: info
- id: CLAUDE.S.0012.extra_frontmatter_keys
  type: mechanical
  check: frontmatter_extra_keys
  args:
    allowed: [paths]
    path: ".claude/rules/**/*.md"
  message: "Only 'paths' frontmatter key is processed by Claude Code — other keys are silently ignored"
  severity: info
