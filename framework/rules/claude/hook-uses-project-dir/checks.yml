checks:
- id: CLAUDE.G.0001.settings_file_exists
  type: mechanical
  check: file_exists
- id: CLAUDE.G.0001.uses_project_dir_var
  expect: present
  message: No hook command references $CLAUDE_PROJECT_DIR or $CLAUDE_ENV_FILE
  pattern-regex: (?:\$CLAUDE_PROJECT_DIR|\$CLAUDE_ENV_FILE|\$\{CLAUDE_PROJECT_DIR\})
  type: deterministic
