# OpenAI Codex Agent Configuration
# Schema: schemas/agent.schema.yml v0.5.0
#
# AGENTS.md is a cross-agent standard (agents.md) — its presence alone
# does not indicate a Codex project. Detection requires .codex/ markers
# (config.toml, rules/, agents/, hooks.json) or AGENTS.override.md.
#
# Synced from .claude/skills/audit-agent/assets/registry/codex/config.yml
# Last verified: 2026-05-06
#
# Items intentionally NOT included here (cannot be statically measured):
#   - fallback_main: project_doc_fallback_filenames is user-configurable in
#     ~/.codex/config.toml; the validator cannot statically know what filenames
#     a user has declared.
#   - plugins: marketplace install path not documented in stable form.
#   - scheduled_tasks: Codex Desktop Automations on-disk path not documented.
#   - cloud-managed requirements / macOS MDM preferences (not flat files).

agent: codex
version: "0.5.0"
prefix: CODEX
name: OpenAI Codex

file_types:
  main:
    # AGENTS.md walked from project root to cwd, concatenated (chain).
    # Per-directory order: AGENTS.override.md > AGENTS.md > project_doc_fallback_filenames.
    # Combined byte cap: project_doc_max_bytes (32 KiB default).
    source: https://developers.openai.com/codex/guides/agents-md/
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/AGENTS.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/AGENTS.md", "~/.codex/AGENTS.override.md"]
        precedence: user
        vcs: external
        cardinality: singleton
        maintainer: human

  override:
    # AGENTS.override.md — same walk as main, checked first at each directory level.
    # Also recognized at ~/.codex/AGENTS.override.md (declared on `main.user` above).
    source: https://developers.openai.com/codex/guides/agents-md/
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: mutable
    loading: session_start
    scopes:
      project:
        patterns: ["**/AGENTS.override.md"]
        precedence: user
        vcs: committed
        maintainer: human

  nested_context:
    # Per-package AGENTS.md in subdirectories below cwd. Codex's chain walk goes
    # project-root → cwd, so files BELOW cwd aren't eagerly loaded — but a user
    # who cd's into those subdirectories will pick them up. scope: nested
    # captures the subtree-by-location semantic without overloading `global`.
    source: https://developers.openai.com/codex/guides/agents-md/
    format: freeform
    scope: nested
    cardinality: hierarchical
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: ["**/AGENTS.md"]
        precedence: project
        vcs: committed
        maintainer: human

  skills:
    # 6 discovery scopes per Codex docs: CWD .agents/skills, parent ../.agents/skills,
    # repo root .agents/skills, user ~/.agents/skills + ~/.codex/skills, admin
    # /etc/codex/skills (Linux/macOS) or %ProgramData%\OpenAI\Codex\skills (Windows),
    # and system bundled (no on-disk path).
    source: https://developers.openai.com/codex/skills/
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: hierarchical
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".agents/skills/**/SKILL.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.agents/skills/**/SKILL.md", "~/.codex/skills/**/SKILL.md"]
        precedence: user
        vcs: external
        maintainer: human
      system:
        patterns:
          - "/etc/codex/skills/**/SKILL.md"
          - "C:/ProgramData/OpenAI/Codex/skills/**/SKILL.md"
        precedence: managed
        vcs: external
        maintainer: system

  skill_metadata:
    # Per-skill optional: zero or one openai.yaml per skill
    source: https://developers.openai.com/codex/skills/
    format: schema_validated
    scope: task_scoped
    cardinality: optional
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: ["**/agents/openai.yaml"]
        precedence: project
        vcs: committed
        maintainer: human

  agents:
    source: https://developers.openai.com/codex/subagents
    format: schema_validated
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".codex/agents/*.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/agents/*.toml"]
        precedence: user
        vcs: external
        maintainer: human

  rules:
    # Starlark .rules — execution control via prefix_rule(). Both project and
    # user scopes documented.
    source: https://developers.openai.com/codex/rules
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".codex/rules/*.rules"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/rules/*.rules"]
        precedence: user
        vcs: external
        maintainer: human

  hooks:
    # 6 events: SessionStart, PreToolUse, PostToolUse, PermissionRequest,
    # UserPromptSubmit, Stop. Requires [features] codex_hooks = true.
    # Hooks can also live inline in [hooks] table inside config.toml.
    source: https://developers.openai.com/codex/hooks
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: [".codex/hooks.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/hooks.json"]
        precedence: user
        vcs: external
        maintainer: human

  config:
    # User-level singleton: ~/.codex/config.toml.
    # Project-level chain: .codex/config.toml walked from project root to cwd
    # (closest wins). Trusted projects only.
    source: https://developers.openai.com/codex/config-advanced/
    format: schema_validated
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".codex/config.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/config.toml"]
        precedence: user
        vcs: external
        maintainer: human
        cardinality: singleton

  mcp:
    # MCP servers in [mcp_servers.<id>] tables. Both user and project config.toml
    # accept the section; project scope requires trusted-project status.
    source: https://developers.openai.com/codex/mcp
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".codex/config.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.codex/config.toml"]
        precedence: user
        vcs: external
        maintainer: human

  memory:
    # Codex memory (`~/.codex/memories/`) is generated state, not a
    # user-authored markdown surface. Per the official docs: "Codex stores
    # memories under your Codex home directory" and "treats these files as
    # generated state" — they're populated in the background and shaped by
    # the model, not by the user.
    #
    # Control plane (not directly inspectable on disk):
    #   - `/memories` slash command in the TUI/app — per-thread enable for
    #     reading existing memories and feeding new ones.
    #   - `config.toml` keys: `memories.generate_memories`,
    #     `memories.use_memories`, `memories.disable_on_external_context`,
    #     `memories.min_rate_limit_remaining_percent`, `memories.extract_model`,
    #     `memories.consolidation_model`.
    #
    # Declared as a tombstone — no `scopes:` block, no patterns to glob.
    # This keeps the surface visible in the agent registry (so audits know
    # it exists) while inviting no instruction-quality rule pressure.
    # `maintainer: agent` and `lifecycle: mutable` mark it as agent-owned
    # cache, not human-authored content.
    source: https://developers.openai.com/codex/memories
    format: opaque
    scope: global
    cardinality: collection
    lifecycle: mutable
    loading: session_start

  enterprise:
    # Admin-enforced requirements.toml. Constrains approval policy, sandbox,
    # MCP allowlists, hooks, command rules, filesystem permissions.
    source: https://developers.openai.com/codex/enterprise/managed-configuration
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      system:
        patterns:
          - "/etc/codex/requirements.toml"
          - "C:/ProgramData/OpenAI/Codex/requirements.toml"
        precedence: managed
        vcs: external
        maintainer: system

excludes:
  - CLAUDE:*
  - COPILOT:*
  - CORE:S:0033  # import-depth-within-limit — Codex AGENTS.md does not support chained @import
