# Google Gemini Agent Configuration
# Schema: schemas/agent.schema.yml v0.5.0
#
# Synced from .claude/skills/audit-agent/assets/registry/gemini/config.yml
# Last verified: 2026-05-06
#
# Items intentionally NOT included here (not measurable on disk):
#   - Cloud-managed enterprise policies (Google Cloud admin / Code Assist Enterprise)
#   - Scheduled tasks (CLI itself doesn't have native scheduling — uses external cron)

agent: gemini
version: "0.5.0"
prefix: GEMINI
name: Google Gemini

file_types:
  main:
    # GEMINI.md walked from project root through ancestors of cwd to .git or home.
    # All discovered files concatenated. Subdirectory GEMINI.md is "Just-In-Time"
    # loaded on-demand (`nested_context`). User-scope file at ~/.gemini/GEMINI.md
    # also doubles as the memory surface (agent appends to ## Gemini Added Memories).
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/gemini-md.md
    required: true
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/GEMINI.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/GEMINI.md"]
        precedence: user
        vcs: external
        maintainer: hybrid
        lifecycle: mutable

  nested_context:
    # Subdirectory GEMINI.md files — Just-In-Time loaded when Gemini accesses
    # files in those directories. scope: nested captures the location-based
    # subtree applicability without overloading other scope values.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/gemini-md.md
    format: freeform
    scope: nested
    cardinality: hierarchical
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: ["**/GEMINI.md"]
        precedence: project
        vcs: committed
        maintainer: human

  cross_read:
    # Cross-agent files (AGENTS.md, CONTEXT.md) when context.fileName is configured.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/reference/configuration.md
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/AGENTS.md", "**/CONTEXT.md"]
        precedence: project
        vcs: committed
        maintainer: human

  skills:
    # `.agents/skills/` is the cross-agent alias supported by Gemini.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/skills.md
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: hierarchical
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/skills/**/SKILL.md", ".agents/skills/**/SKILL.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/skills/**/SKILL.md", "~/.agents/skills/**/SKILL.md"]
        precedence: user
        vcs: external
        maintainer: human

  agents:
    # Subagents — built-ins: codebase_investigator, cli_help, generalist_agent,
    # browser_agent (experimental). Custom agents invoked via @name syntax.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/core/subagents.md
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/agents/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/agents/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  commands:
    # TOML format with prompt + description, supports {{args}}, !{shell}, @{file}
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/custom-commands.md
    format: schema_validated
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/commands/*.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/commands/*.toml"]
        precedence: user
        vcs: external
        maintainer: human

  hooks:
    # 11 events configured under hooks key in settings.json.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/hooks/index.md
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json"]
        precedence: user
        vcs: external
        maintainer: human

  config:
    # Gemini supports both JSON and TOML settings files.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/reference/configuration.md
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json", ".gemini/settings.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json", "~/.gemini/settings.toml"]
        precedence: user
        vcs: external
        maintainer: human
      system_defaults:
        patterns:
          - "/etc/gemini-cli/system-defaults.json"
          - "/Library/Application Support/GeminiCli/system-defaults.json"
          - "C:/ProgramData/gemini-cli/system-defaults.json"
        precedence: managed
        vcs: external
        maintainer: system
      system_overrides:
        patterns:
          - "/etc/gemini-cli/settings.json"
          - "/Library/Application Support/GeminiCli/settings.json"
        precedence: managed
        vcs: external
        maintainer: system

  mcp:
    # MCP servers under mcpServers key in settings.json/settings.toml.
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/reference/configuration.md
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json", ".gemini/settings.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json", "~/.gemini/settings.toml"]
        precedence: user
        vcs: external
        maintainer: human

  extensions:
    # Plugin system: bundles MCP servers, commands, skills, hooks, themes
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/extensions/writing-extensions.md
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/extensions/**"]
        precedence: project
        vcs: committed
        maintainer: human

  geminiignore:
    source: https://github.com/google-gemini/gemini-cli
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".geminiignore"]
        precedence: project
        vcs: committed
        maintainer: human

  system_prompt:
    # Replace default system prompt entirely
    source: https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/system-prompt.md
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/system-prompt.md"]
        precedence: project
        vcs: committed
        maintainer: human

excludes:
  - CLAUDE:*
  - CODEX:*
