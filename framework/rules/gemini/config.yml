# Google Gemini Agent Configuration
# Schema: schemas/agent.schema.yml v0.5.0
#
# Synced from .claude/skills/audit-agent/assets/registry/gemini/config.yml
# Last verified: 2026-05-06
#
# Items intentionally NOT included here (not measurable on disk):
#   - Cloud-managed enterprise policies (Google Cloud admin / Code Assist Enterprise)
#   - Scheduled tasks (CLI itself doesn't have native scheduling — uses external cron)

agent: gemini
version: "0.5.0"
prefix: GEMINI
name: Google Gemini

file_types:
  main:
    # GEMINI.md walked from project root through ancestors of cwd to .git or home.
    # All discovered files concatenated. Subdirectory GEMINI.md is "Just-In-Time"
    # loaded on-demand (`nested_context`). User-scope file at ~/.gemini/GEMINI.md
    # also doubles as the memory surface (agent appends to ## Gemini Added Memories).
    source: https://geminicli.com/docs/cli/gemini-md/
    required: true
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/GEMINI.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/GEMINI.md"]
        precedence: user
        vcs: external
        maintainer: hybrid
        lifecycle: mutable

  nested_context:
    # Subdirectory GEMINI.md files — Just-In-Time loaded when Gemini accesses
    # files in those directories. scope: nested captures the location-based
    # subtree applicability without overloading other scope values.
    source: https://geminicli.com/docs/cli/gemini-md/
    format: freeform
    scope: nested
    cardinality: hierarchical
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: ["**/GEMINI.md"]
        precedence: project
        vcs: committed
        maintainer: human

  cross_read:
    # Cross-agent files (AGENTS.md, CONTEXT.md) when context.fileName is configured.
    source: https://geminicli.com/docs/reference/configuration/
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/AGENTS.md", "**/CONTEXT.md"]
        precedence: project
        vcs: committed
        maintainer: human

  skills:
    # `.agents/skills/` is the cross-agent alias supported by Gemini.
    source: https://geminicli.com/docs/cli/skills/
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: hierarchical
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/skills/**/SKILL.md", ".agents/skills/**/SKILL.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/skills/**/SKILL.md", "~/.agents/skills/**/SKILL.md"]
        precedence: user
        vcs: external
        maintainer: human

  agents:
    # Subagents — built-ins: codebase_investigator, cli_help, generalist_agent,
    # browser_agent (experimental). Custom agents invoked via @name syntax.
    source: https://geminicli.com/docs/core/subagents/
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/agents/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/agents/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  commands:
    # TOML format with prompt + description, supports {{args}}, !{shell}, @{file}
    source: https://geminicli.com/docs/cli/custom-commands/
    format: schema_validated
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".gemini/commands/*.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/commands/*.toml"]
        precedence: user
        vcs: external
        maintainer: human

  hooks:
    # 11 events configured under hooks key in settings.json.
    source: https://geminicli.com/docs/hooks/
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json"]
        precedence: user
        vcs: external
        maintainer: human

  config:
    # Gemini supports both JSON and TOML settings files.
    source: https://geminicli.com/docs/reference/configuration/
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json", ".gemini/settings.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json", "~/.gemini/settings.toml"]
        precedence: user
        vcs: external
        maintainer: human
      system_defaults:
        patterns:
          - "/etc/gemini-cli/system-defaults.json"
          - "/Library/Application Support/GeminiCli/system-defaults.json"
          - "C:/ProgramData/gemini-cli/system-defaults.json"
        precedence: managed
        vcs: external
        maintainer: system
      system_overrides:
        patterns:
          - "/etc/gemini-cli/settings.json"
          - "/Library/Application Support/GeminiCli/settings.json"
        precedence: managed
        vcs: external
        maintainer: system

  mcp:
    # MCP servers under mcpServers key in settings.json/settings.toml.
    source: https://geminicli.com/docs/reference/configuration/
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/settings.json", ".gemini/settings.toml"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.gemini/settings.json", "~/.gemini/settings.toml"]
        precedence: user
        vcs: external
        maintainer: human

  extensions:
    # Plugin system: bundles MCP servers, commands, skills, hooks, themes
    source: https://geminicli.com/docs/extensions/writing-extensions/
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/extensions/**"]
        precedence: project
        vcs: committed
        maintainer: human

  geminiignore:
    source: https://geminicli.com/docs/cli/gemini-ignore/
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".geminiignore"]
        precedence: project
        vcs: committed
        maintainer: human

  system_prompt:
    # Replace default system prompt entirely
    source: https://geminicli.com/docs/cli/system-prompt/
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".gemini/system-prompt.md"]
        precedence: project
        vcs: committed
        maintainer: human

  memory:
    # Gemini's memory model is a four-tier hierarchy (see snippets.ts
    # `renderOperationalGuidelines` in google-gemini/gemini-cli):
    #
    #   1. Project Instructions  — ./GEMINI.md            (this config: `main`, scopes.project)
    #   2. Subdir Instructions   — ./**/GEMINI.md         (this config: `nested_context`)
    #   3. Private Project Memory — ~/.gemini/tmp/<hash>/memory/MEMORY.md
    #                              + sibling *.md notes   (THIS block)
    #   4. Global Personal Memory — ~/.gemini/GEMINI.md   (this config: `main`, scopes.user)
    #
    # Only tier 3 — the private project memory directory — lives under
    # `memory`. The other tiers are GEMINI.md context files modeled by
    # `main` and `nested_context`. The legacy "Gemini Added Memories"
    # section model inside ~/.gemini/GEMINI.md has been retired upstream
    # (0 hits in the gemini-cli source for that string) and is no longer
    # the memory write target.
    #
    # The directory glob mirrors Claude's shape — MEMORY.md is the index
    # and sibling *.md files are entries. `memory_locator` enumerates them
    # via the standard directory-glob dispatch.
    # See also https://geminicli.com/docs/reference/memport/ for the @-import
    # syntax used to compose GEMINI.md files.
    source: https://geminicli.com/docs/cli/tutorials/memory-management/
    format: freeform
    scope: global
    cardinality: collection
    lifecycle: mutable
    loading: session_start
    scopes:
      user_project:
        patterns: ["~/.gemini/tmp/*/memory/"]
        precedence: user
        vcs: external
        maintainer: hybrid

excludes:
  - CLAUDE:*
  - CODEX:*
