  expect: present
  pattern-regex: (?:\$CURSOR_PROJECT_DIR|\$CLAUDE_PROJECT_DIR|\$\{CURSOR_PROJECT_DIR\})
  message: No hook command references $CURSOR_PROJECT_DIR
