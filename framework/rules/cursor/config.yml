# Cursor Agent Configuration
# Schema: schemas/agent.schema.yml v0.5.0
#
# Synced from .claude/skills/audit-agent/assets/registry/cursor/config.yml
# Last verified: 2026-06-15
#
# Items intentionally NOT included here (not measurable on disk):
#   - User Rules (Cursor Settings UI text)
#   - Team Rules (Cursor dashboard, cloud-managed)
#   - Cursor Automations (cloud-only, no on-disk file)
#   - Cursor Memories (cloud / agent-state, no static project file)
#   - Design Mode (in-app UI)
#   - CLI --output-format (CLI flag, not a file)

agent: cursor
version: "0.5.0"
prefix: CURSOR
name: Cursor

file_types:
  main:
    # AGENTS.md walked from project root through ancestors of cwd. Per docs:
    # "Cursor supports AGENTS.md in the project root and subdirectories. ...
    # combined with parent directories, with more specific instructions taking precedence."
    source: https://cursor.com/docs/rules
    format: freeform
    scope: global
    cardinality: chain
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: ["**/AGENTS.md"]
        precedence: project
        vcs: committed
        maintainer: human

  nested_context:
    # Subdirectory AGENTS.md files surfaced when running from a deeper cwd.
    # Per Cursor docs: nested AGENTS.md combined with parent directories,
    # closer files take precedence. scope: nested captures the subtree-by-location.
    source: https://cursor.com/docs/rules
    format: freeform
    scope: nested
    cardinality: hierarchical
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: ["**/AGENTS.md"]
        precedence: project
        vcs: committed
        maintainer: human

  rules:
    # .cursor/rules/ with MDC frontmatter — 4 activation modes per file:
    # alwaysApply (always loaded), intelligent (agent decides), globs (file-scoped),
    # manual (@-mention only). globs frontmatter makes this path_scoped — the
    # path filter is in-file, not just at the surface level.
    source: https://cursor.com/docs/rules
    format: [frontmatter, freeform]
    scope: path_scoped
    cardinality: collection
    lifecycle: static
    loading: on_demand
    scopes:
      project:
        patterns: [".cursor/rules/**/*.mdc", ".cursor/rules/**/*.md"]
        precedence: project
        vcs: committed
        maintainer: human

  legacy_cursorrules:
    # Deprecated, replaced by .cursor/rules/
    source: https://cursor.com/docs/rules
    deprecated: true
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursorrules"]
        precedence: project
        vcs: committed
        maintainer: human

  skills:
    # Cross-agent skill paths supported (.claude/skills, .codex/skills, .agents/skills)
    source: https://cursor.com/docs/skills
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: hierarchical
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".cursor/skills/**/SKILL.md", ".claude/skills/**/SKILL.md", ".codex/skills/**/SKILL.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.cursor/skills/**/SKILL.md", "~/.claude/skills/**/SKILL.md", "~/.codex/skills/**/SKILL.md"]
        precedence: user
        vcs: external
        maintainer: human

  agents:
    # Built-in subagents: Explore, Bash, Browser. Cross-agent paths supported.
    source: https://cursor.com/docs/subagents
    format: [frontmatter, freeform]
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".cursor/agents/*.md", ".claude/agents/*.md", ".codex/agents/*.md"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.cursor/agents/*.md", "~/.claude/agents/*.md", "~/.codex/agents/*.md"]
        precedence: user
        vcs: external
        maintainer: human

  hooks:
    # 20+ events; command + prompt hook types
    source: https://cursor.com/docs/hooks
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursor/hooks.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.cursor/hooks.json"]
        precedence: user
        vcs: external
        maintainer: human
      managed:
        patterns:
          - "/Library/Application Support/Cursor/hooks.json"
          - "/etc/cursor/hooks.json"
          - "C:/ProgramData/Cursor/hooks.json"
        precedence: managed
        vcs: external
        maintainer: system

  mcp:
    source: https://cursor.com/docs/mcp
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursor/mcp.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.cursor/mcp.json"]
        precedence: user
        vcs: external
        maintainer: human

  commands:
    # Slash commands — freeform markdown
    source: https://cursor.com/docs/context/commands
    format: freeform
    scope: task_scoped
    cardinality: collection
    lifecycle: static
    loading: on_invocation
    scopes:
      project:
        patterns: [".cursor/commands/*.md"]
        precedence: project
        vcs: committed
        maintainer: human

  config:
    # Cursor settings — both project (.vscode/settings.json or .cursor/settings.json)
    # and user (~/.cursor/settings.json) levels
    source: https://cursor.com/docs/cli/reference/configuration
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".vscode/settings.json", ".cursor/settings.json"]
        precedence: project
        vcs: committed
        maintainer: human
      user:
        patterns: ["~/.cursor/settings.json"]
        precedence: user
        vcs: external
        maintainer: human

  managed_policy:
    # MDM on macOS (.mobileconfig), Group Policy on Windows (ADMX/ADML),
    # policy.json on Linux
    source: https://cursor.com/docs/enterprise
    format: schema_validated
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      managed:
        patterns: ["~/.cursor/policy.json"]
        precedence: managed
        vcs: external
        maintainer: system

  plugins:
    # .cursor-plugin/ manifest — marketplace + team marketplaces
    source: https://cursor.com/docs/plugins
    format: schema_validated
    scope: global
    cardinality: collection
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursor-plugin/plugin.json"]
        precedence: project
        vcs: committed
        maintainer: human

  bugbot:
    # BugBot project-level review instructions
    source: https://cursor.com/docs/bugbot
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursor/BUGBOT.md"]
        precedence: project
        vcs: committed
        maintainer: human

  bugbot_rules:
    # Auto-generated learned rules under .cursor/rules/ — agent-managed.
    # Bugbot decides when each rule applies (auto-promoted/disabled), so the
    # path-filter aspect is agent-driven rather than user-authored frontmatter.
    source: https://cursor.com/docs/bugbot
    format: frontmatter
    scope: global
    cardinality: collection
    lifecycle: mutable
    loading: on_demand
    scopes:
      auto:
        patterns: [".cursor/rules/**/*.mdc"]
        precedence: project
        vcs: committed
        maintainer: agent

  ignore:
    source: https://cursor.com/docs/reference/ignore-file
    format: freeform
    scope: global
    cardinality: singleton
    lifecycle: static
    loading: session_start
    scopes:
      project:
        patterns: [".cursorignore"]
        precedence: project
        vcs: committed
        maintainer: human

excludes:
  - CLAUDE:*
  - CODEX:*
