# Project configuration schema (.ails/config.yml)
version: "0.1.0"

# Removed instruction_files (moved to agent config).
# Updated rules.disabled/overrides for coordinate format.

fields:
  schema_version:
    required: true
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    default: "0.1.0"
    description: "Config schema version (semver). CLI validates against supported range."

  agent:
    required: false
    type: string
    default: "claude"
    description: "Default agent for this project (loads agent config from rules repo)"

  components:
    required: false
    type: array
    description: "Monorepo component definitions for multi-path scoring"
    items:
      type: object
      properties:
        path:
          required: true
          type: string
          description: "Relative path to component root"
        main:
          type: string
          default: "CLAUDE.md"
          description: "Component's primary instruction file"
        expected_level:
          type: string
          pattern: "^L[1-6]$"
          description: "Target maturity level for this component"
        role:
          type: enum
          values: [coordinator, component, library, docs]
          default: component
          description: "Component role (affects which rules apply)"

  rules:
    required: false
    type: object
    description: "Project-level rule overrides and exclusions"
    properties:
      disabled:
        type: array
        description: "Rule coordinates to skip entirely"
        items:
          type: string
          pattern: "^[A-Z_]+:[SCDEGM]:[0-9]{4}$"
      overrides:
        type: object
        description: "Per-check severity adjustments (key = check coordinate)"
        additionalProperties:
          type: object
          properties:
            severity:
              type: enum
              values: [critical, high, medium, low]
              description: "Override default severity for this check"
            disabled:
              type: boolean
              description: "Disable this specific check"

  scoring:
    required: false
    type: object
    description: "Scoring configuration for CLI output"
    properties:
      scope:
        type: enum
        values: [main, all, aggregate]
        default: main
        description: "What to score: main file only, all files, or aggregate across components"

  tiers:
    required: false
    type: object
    description: "Tier filter for rule activation by evidence confidence."
    properties:
      core:
        type: boolean
        default: true
        description: "Enforce rules backed by official/research sources (weight >= 0.8)"
      experimental:
        type: boolean
        default: true
        description: "Enforce rules backed by community sources only (weight < 0.8)"

  agents:
    required: false
    type: object
    description: "Per-agent overrides keyed by agent id (claude, codex, cursor, etc.)."
    additionalProperties:
      type: object
      properties:
        fallback_filenames:
          type: array
          items: { type: string }
          description: |
            Additional instruction filenames to scan for this agent's `main`
            surface. Use to mirror Codex `project_doc_fallback_filenames` (e.g.
            ["TEAM_GUIDE.md", ".agents.md"]) without round-tripping through the
            agent's own home config.

  surfaces:
    required: false
    type: object
    description: |
      Per-surface include/exclude pattern adjustments. Keys are
      `<agent_id>.<file_type>` (e.g. `codex.main`, `cursor.rules`).
    additionalProperties:
      type: object
      properties:
        include:
          type: array
          items: { type: string }
          description: "Additional glob patterns to scan for this surface."
        exclude:
          type: array
          items: { type: string }
          description: "Glob patterns whose matches are dropped from this surface."

  exclude_dirs:
    required: false
    type: array
    items: { type: string }
    description: |
      Directory names to skip during discovery (additional to the built-in
      list). Any directory matching one of these names is excluded wherever it
      appears in the tree.

  exclude_files:
    required: false
    type: array
    items: { type: string }
    description: |
      File path globs to skip during discovery, matched against each file's
      path relative to the project root with `pathlib` glob semantics (each
      `*`/`**` segment matches one path component, so a subtree needs a
      trailing wildcard: `.claude/skills/**/*`). Examples: `.claude/agents/lead.md`,
      `.claude/skills/**/*`, `**/lead.md`. Use to drop symlinked or externally
      owned instruction files from scoring. An explicitly targeted file
      (`ails check <path>`) bypasses exclusion.

defaults:
  schema_version: "0.1.0"
  agent: "claude"
  scoring:
    scope: main
  tiers:
    core: true
    experimental: true

validation:
  - rule: "schema_version must be supported (currently: 0.1.0)"
  - rule: "Unknown fields should warn, not error"
  - rule: "If tiers.core is false, no rules are enforced"
  - rule: "rules.disabled items must be valid rule coordinates"
  - rule: "rules.overrides keys must be valid check coordinates"

examples:
  minimal: |
    schema_version: "0.1.0"

  monorepo: |
    schema_version: "0.1.0"
    agent: claude
    components:
      - path: "packages/api"
        role: component
        expected_level: L3
      - path: "packages/shared"
        role: library
        expected_level: L2
    scoring:
      scope: aggregate

  with_overrides: |
    schema_version: "0.1.0"
    agent: claude
    rules:
      disabled: ["CORE:E:0002"]
      overrides:
        "CORE.S.0001.file-exists":
          severity: medium

  strict: |
    schema_version: "0.1.0"
    tiers:
      core: true
      experimental: false

  with_surface_adjustments: |
    schema_version: "0.1.0"
    agent: codex
    agents:
      codex:
        fallback_filenames: ["TEAM_GUIDE.md", ".agents.md"]
    surfaces:
      cursor.rules:
        exclude: ["**/draft/**"]
      claude.skills:
        include: [".github/skills/**/SKILL.md"]
